name: Build and Publish Python Package

on:
  pull_request:
    paths:
      - 'src/python/**'
      - '.github/workflows/pypi_publish.yml'
  release:
    types: [created]
  workflow_dispatch:

jobs:
  test:
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' &&
       startsWith(github.ref, 'refs/tags/') &&
       contains(github.ref, 'py_v'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11-3.13 run the full suite. 3.10 and 3.14 install only the lean
        # essential deps and skip the extra tests (`test_extra_*`, which cover
        # the optional mlflow converter and ML frameworks).
        include:
          - python-version: "3.10"
            extras: test-essential
            pytest-args: "--ignore-glob='*test_extra_*'"
          - python-version: "3.11"
            extras: test
            pytest-args: ""
          - python-version: "3.12"
            extras: test
            pytest-args: ""
          - python-version: "3.13"
            extras: test
            pytest-args: ""
          - python-version: "3.14"
            extras: test-essential
            pytest-args: "--ignore-glob='*test_extra_*'"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: '**/pyproject.toml'

      - name: Install dependencies
        run: |
          pip install -e "src/python[core,${{ matrix.extras }}]"

      - name: Run tests
        working-directory: src/python
        run: |
          pytest tests ${{ matrix.pytest-args }}

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    environment: pypi
    permissions:
      id-token: write
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'release' && 
       startsWith(github.ref, 'refs/tags/') && 
       contains(github.ref, 'py_v'))
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: '**/pyproject.toml'
          
      - name: Install dependencies
        run: |
          pip install setuptools wheel build
          
      - name: Build
        working-directory: src/python
        run: |
          python -m build
      - name: Move dist files
        run: |
          mkdir -p dist/
          mv src/python/dist/* dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1